name: Daily Menu Bot

on:
  schedule:
    # KST 평일 07:50 (UTC 전날 22:50). 정각(:00)은 전 세계 cron이 몰려 지연·누락이
    # 잦으므로 어중간한 분(:50)으로 피크 회피. 단, GitHub schedule은 best-effort라
    # 약간의 지연 가능성은 남는다.
    - cron: "50 22 * * 0-4"

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-menu:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm start
